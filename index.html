<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Приглашение</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; color: white; text-align: center; overflow: hidden; background: #222; }
        body::before { content: ""; position: fixed; width: 100%; height: 100%; background: url('photo.jpg') center/cover no-repeat; filter: blur(25px) brightness(0.6); z-index: -1; }
        .card { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); padding: 20px; border-radius: 20px; max-width: 360px; width: 90%; box-shadow: 0 10px 40px rgba(0,0,0,0.5); position: relative; }
        .highlight { font-weight: bold; text-shadow: 0 0 12px rgba(255,255,255,0.9); }
        .invite-photo { width: 100%; max-width: 280px; border-radius: 20px; margin: 15px auto; display: block; box-shadow: 0 15px 35px rgba(0,0,0,0.5); border: 3px solid rgba(255,255,255,0.5); }
        .bottom-info { margin-top: 10px; font-size: 14px; background: rgba(255,255,255,0.15); padding: 10px; border-radius: 12px; }
        button { font-size: 16px; padding: 12px 20px; margin: 10px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #yes { background: #00c853; color: white; }
        #no { background: #ff1744; color: white; position: absolute; }
        #message { display: none; margin-top: 15px; font-size: 18px; font-weight: bold; color: #00ff88; }
        .confetti { position: fixed; width: 8px; height: 8px; top: -10px; animation: fall linear infinite; z-index: 100; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <h1>🎂 VIP Приглашение</h1>
    <p id="guest">Загрузка...</p>
    <p>Дорогой друг! 💌<br><br><span class="highlight">Приглашаю тебя на день рождения моей любимой Кули 🎂✨</span></p>
    <img src="photo.jpg" class="invite-photo">
    <div class="bottom-info">
        <p>👗 Дресс-код: розово-белый</p>
        <p>📍 <a href="https://2gis.kz/aktobe/geo/70030076394441340" target="_blank" style="color:white;">СК Строитель 4, 54А</a></p>
        <p>📅 30 апреля | ⏰ 17:00</p>
    </div>
    <div style="height: 60px; position: relative; margin-top: 10px;">
        <button id="yes">Я приду 😍</button>
        <button id="no">Не приду 😢</button>
    </div>
    <div id="message">🔥 ТЫ В СПИСКЕ ГОСТЕЙ 🔥</div>
</div>

<audio id="bgMusic" loop preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('guest').textContent = `Привет, ${params.get('name') || 'Друг'}!`;

    const yesBtn = document.getElementById('yes');
    const noBtn = document.getElementById('no');
    const bgMusic = document.getElementById('bgMusic');

    // Функция запуска
    function startMusic() {
        bgMusic.play();
    }

    // РАЗБЛОКИРОВКА ЗВУКА (очень важно)
    window.addEventListener('touchstart', function() {
        bgMusic.play();
        bgMusic.pause();
    }, { once: true });

    document.addEventListener('click', startMusic, { once: true });

    noBtn.addEventListener('mouseover', moveBtn);
    noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveBtn(); });

    function moveBtn() {
        noBtn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
        noBtn.style.top = Math.random() * (window.innerHeight - 50) + 'px';
    }

    yesBtn.addEventListener('click', () => {
        bgMusic.volume = 1.0;
        bgMusic.play(); 
        document.getElementById('message').style.display = 'block';
        noBtn.style.display = 'none';
        for (let i = 0; i < 50; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
            c.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(c);
        }
    });
</script>
</body>
</html>
