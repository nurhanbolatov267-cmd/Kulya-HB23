<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Приглашение</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
    overflow: hidden;
    background: black;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url('photo.jpg') center/cover no-repeat;
    filter: blur(18px) brightness(0.4);
    z-index: -1;
}

.card {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    padding: 25px;
    border-radius: 20px;
    width: 85%;
    max-width: 360px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

h1 { margin: 0 0 10px; }

button {
    padding: 12px 20px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
    margin: 5px;
}

#yes { background: #00c853; color: white; }
#no { background: #ff1744; color: white; position: fixed; }

#msg {
    display:none;
    margin-top:15px;
    color:#00ff99;
    font-weight:bold;
}

.confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    top: -10px;
    animation: fall linear forwards;
}

@keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); }
}

/* FLASH */
.flash {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 9999;
}
</style>
</head>

<body>

<div class="flash" id="flash"></div>

<div class="card">
    <h1>🎂 VIP ULTRA INVITE</h1>
    <p id="guest">Загрузка...</p>

    <button id="yes">Я приду 🔥</button>
    <button id="no">Не приду 😈</button>

    <div id="msg">🔥 ТЫ В VIP СПИСКЕ 🔥</div>
</div>

<audio id="music" preload="auto" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3b3c8e2b6f.mp3?filename=party-112194.mp3">
</audio>

<script>
const params = new URLSearchParams(location.search);
document.getElementById("guest").textContent =
"Привет, " + (params.get("name") || "Друг") + "!";

const yes = document.getElementById("yes");
const no = document.getElementById("no");
const msg = document.getElementById("msg");
const music = document.getElementById("music");
const flash = document.getElementById("flash");

/* ---------- AUDIO ENGINE (BASS BOOST) ---------- */
let audioCtx, source, gain;

function initAudio() {
    if (audioCtx) return;

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    source = audioCtx.createMediaElementSource(music);

    gain = audioCtx.createGain();
    gain.gain.value = 1.6; // громкость boost

    source.connect(gain);
    gain.connect(audioCtx.destination);
}

/* ---------- FIRST CLICK UNLOCK ---------- */
document.body.addEventListener("click", () => {
    music.play().catch(()=>{});
    initAudio();
    if (audioCtx && audioCtx.state === "suspended") {
        audioCtx.resume();
    }
}, { once:true });

/* ---------- NO BUTTON ESCAPE ---------- */
function moveNo() {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);
    no.style.left = x + "px";
    no.style.top = y + "px";
}
no.addEventListener("mouseover", moveNo);
no.addEventListener("touchstart", moveNo);

/* ---------- YES CLICK ULTRA EFFECT ---------- */
yes.onclick = () => {

    music.play().catch(()=>{});

    // vibration 📳
    if (navigator.vibrate) {
        navigator.vibrate([200,100,200,100,400]);
    }

    // flash ⚡
    flash.style.opacity = 1;
    setTimeout(()=> flash.style.opacity = 0, 150);

    msg.style.display = "block";
    no.style.display = "none";

    // confetti 🎉
    for (let i=0;i<80;i++){
        const c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random()*100+"vw";
        c.style.background = `hsl(${Math.random()*360},100%,50%)`;
        c.style.animationDuration = (Math.random()*3+2)+"s";
        document.body.appendChild(c);
    }
};
</script>

</body>
</html>
