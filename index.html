<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Приглашение</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: Arial;
    background: black;
    overflow:hidden;
    color:white;
    text-align:center;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:url("photo.jpg") center/cover no-repeat;
    filter:blur(18px) brightness(0.4);
    z-index:-1;
}

.card{
    background:rgba(255,255,255,0.12);
    padding:25px;
    border-radius:20px;
    width:85%;
    max-width:350px;
    backdrop-filter: blur(15px);
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    margin:5px;
    font-size:16px;
    cursor:pointer;
}

#yes{background:#00c853;color:white;}
#no{background:#ff1744;color:white;position:fixed;}

#msg{
    display:none;
    margin-top:15px;
    color:#00ff99;
    font-weight:bold;
}

/* 💥 ВЗРЫВ */
.flash {
    position:fixed;
    inset:0;
    background:white;
    opacity:0;
    pointer-events:none;
    z-index:9999;
    transition: opacity 0.15s;
}

.shake {
    animation: shake 0.4s;
}

@keyframes shake {
    0%{transform:translate(0,0)}
    25%{transform:translate(10px,-10px)}
    50%{transform:translate(-10px,10px)}
    75%{transform:translate(10px,10px)}
    100%{transform:translate(0,0)}
}
</style>
</head>

<body>

<div class="flash" id="flash"></div>

<div class="card">
    <h1>🎂 VIP INVITE</h1>
    <p id="guest">Привет!</p>

    <button id="yes">Я приду 🔥</button>
    <button id="no">Не приду 😢</button>

    <div id="msg">🔥 ТЫ В СПИСКЕ ГОСТЕЙ 🔥</div>
</div>

<!-- 🎵 музыка -->
<audio id="music" preload="auto" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3b3c8e2b6f.mp3?filename=party-112194.mp3">
</audio>

<script>
const yes = document.getElementById("yes");
const no = document.getElementById("no");
const msg = document.getElementById("msg");
const music = document.getElementById("music");
const flash = document.getElementById("flash");

/* 🔊 ВАЖНО: звук запускаем ТОЛЬКО по клику */
document.body.addEventListener("click", () => {
    music.play().catch(()=>{});
}, { once:true });

/* 😈 убегающая кнопка */
no.addEventListener("mouseover", () => {
    no.style.left = Math.random()*(window.innerWidth-100)+"px";
    no.style.top = Math.random()*(window.innerHeight-50)+"px";
});

/* 💥 YES ЭФФЕКТ */
yes.onclick = () => {

    // музыка (ещё раз гарантируем)
    music.play().catch(()=>{});

    // flash 💥
    flash.style.opacity = 1;

    // shake эффект
    document.body.classList.add("shake");

    setTimeout(() => {
        flash.style.opacity = 0;
        document.body.classList.remove("shake");
    }, 200);

    msg.style.display = "block";
    no.style.display = "none";

    // конфетти
    for(let i=0;i<60;i++){
        const c = document.createElement("div");
        c.style.position="fixed";
        c.style.width="8px";
        c.style.height="8px";
        c.style.top="-10px";
        c.style.left=Math.random()*100+"vw";
        c.style.background=`hsl(${Math.random()*360},100%,50%)`;
        c.style.animation="fall 3s linear forwards";
        document.body.appendChild(c);
    }
};

/* конфетти animation */
const style = document.createElement("style");
style.innerHTML = `
@keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); }
}`;
document.head.appendChild(style);
</script>

</body>
</html>
